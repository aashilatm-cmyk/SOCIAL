# To run this code you need to install the following dependencies:
# pip install google-genai

import os
from google import genai
from google.genai import types


def generate():
    client = genai.Client(
        api_key=os.environ.get("GEMINI_API_KEY"),
    )

    model = "gemini-3-flash-preview"
    contents = [
        types.Content(
            role="user",
            parts=[
                types.Part.from_text(text="""INSERT_INPUT_HERE"""),
            ],
        ),
    ]
    tools = [
        types.Tool(googleSearch=types.GoogleSearch(
        )),
    ]
    generate_content_config = types.GenerateContentConfig(
        thinking_config=types.ThinkingConfig(
            thinking_level="HIGH",
        ),
        tools=tools,
        system_instruction=[
            types.Part.from_text(text="""import 'package:flutter/material.dart';
import 'package:provider/provider.dart';

void main() {
  runApp(
    MultiProvider(
      providers: [
        ChangeNotifierProvider(create: (_) => AppState()),
      ],
      child: const SocialMediaApp(),
    ),
  );
}

// --- إدارة حالة التطبيق (Logic) ---
class AppState extends ChangeNotifier {
  int currentIndex = 0;
  
  void changeTab(int index) {
    currentIndex = index;
    notifyListeners();
  }
}

class SocialMediaApp extends StatelessWidget {
  const SocialMediaApp({super.key});

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      debugShowCheckedModeBanner: false,
      theme: ThemeData.dark().copyWith(
        primaryColor: Colors.blueAccent,
        scaffoldBackgroundColor: Colors.black,
      ),
      home: const MainNavigationScreen(),
    );
  }
}

// --- شاشة التنقل الرئيسية ---
class MainNavigationScreen extends StatelessWidget {
  const MainNavigationScreen({super.key});

  final List<Widget> _screens = const [
    HomeScreen(),      // الفيد
    ExploreScreen(),   // الاستكشاف
    CreatePostScreen(),// إنشاء منشور (Studio)
    MessagesScreen(),  // الرسائل الخاصة
    ProfileScreen(),   // الملف الشخصي
  ];

  @override
  Widget build(BuildContext context) {
    var state = context.watch<AppState>();

    return Scaffold(
      body: IndexedStack(
        index: state.currentIndex,
        children: _screens,
      ),
      bottomNavigationBar: BottomNavigationBar(
        currentIndex: state.currentIndex,
        onTap: (index) => state.changeTab(index),
        type: BottomNavigationBarType.fixed,
        selectedItemColor: Colors.blueAccent,
        unselectedItemColor: Colors.grey,
        items: const [
          BottomNavigationBarItem(icon: Icon(Icons.home), label: \"Feed\"),
          BottomNavigationBarItem(icon: Icon(Icons.search), label: \"Explore\"),
          BottomNavigationBarItem(icon: Icon(Icons.add_box_outlined, size: 35), label: \"\"),
          BottomNavigationBarItem(icon: Icon(Icons.chat_bubble_outline), label: \"Messages\"),
          BottomNavigationBarItem(icon: Icon(Icons.person_outline), label: \"Profile\"),
        ],
      ),
    );
  }
}

