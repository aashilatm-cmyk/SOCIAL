class ExploreScreen extends StatelessWidget { const ExploreScreen({super.key}); @override Widget build(BuildContext context) => const Center(child: Text(\"Explore View\")); }
class ProfileScreen extends StatelessWidget { const ProfileScreen({super.key}); @override Widget build(BuildContext context) => const Center(child: Text(\"Profile View\")); }"""),
        ],
    )

    for chunk in client.models.generate_content_stream(
        model=model,
